version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shixun-backend
    ports:
      - "8080:8080"
    volumes:
      - ./mock-data:/app/mock-data:ro
      - sqlite-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/training.db
      - LLM_PROXY_URL=https://llm-proxy.densematrix.ai
      - LLM_PROXY_KEY=sk-wskhgeyawc
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - shixun-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shixun-frontend
    ports:
      - "3080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - shixun-net

networks:
  shixun-net:
    driver: bridge

volumes:
  sqlite-data:
